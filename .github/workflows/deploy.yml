name: Deploy to HostPoint

# Builds the Astro frontend + PHP dependencies and uploads them to HostPoint via SFTP.
# Runs on pushes to main and on manual dispatch. The server-side api/config.php
# (DB + SMTP secrets) is NOT uploaded — it lives on the server and is never in git.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hostpoint
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run check
          npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Assemble deploy directory
        run: |
          mkdir -p deploy
          cp -r frontend/dist/. deploy/
          cp -r api deploy/api
          cp -r vendor deploy/vendor
          cp .htaccess deploy/.htaccess
          # Start from a clean slate — never ship a stray committed config.
          rm -f deploy/api/config.php
          echo "Deploy tree:" && find deploy -maxdepth 2 -type d

      - name: Generate server config (DB + mail) from secrets
        env:
          CFG_BASE_URL:        ${{ secrets.APP_BASE_URL }}
          CFG_DB_HOST:         ${{ secrets.DB_HOST }}
          CFG_DB_PORT:         ${{ secrets.DB_PORT }}
          CFG_DB_NAME:         ${{ secrets.DB_NAME }}
          CFG_DB_USER:         ${{ secrets.DB_USER }}
          CFG_DB_PASSWORD:     ${{ secrets.DB_PASSWORD }}
          CFG_MAIL_FROM_EMAIL: ${{ secrets.MAIL_FROM_EMAIL }}
          CFG_MAIL_FROM_NAME:  ${{ secrets.MAIL_FROM_NAME }}
          CFG_SMTP_HOST:       ${{ secrets.SMTP_HOST }}
          CFG_SMTP_PORT:       ${{ secrets.SMTP_PORT }}
          CFG_SMTP_ENCRYPTION: ${{ secrets.SMTP_ENCRYPTION }}
          CFG_SMTP_USERNAME:   ${{ secrets.SMTP_USERNAME }}
          CFG_SMTP_PASSWORD:   ${{ secrets.SMTP_PASSWORD }}
        run: |
          php bin/make-config.php > deploy/api/config.php
          echo "config.php generated ($(wc -c < deploy/api/config.php) bytes)"

      - name: Upload via SFTP (SSH key auth)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.5
        with:
          server: ${{ secrets.HOSTPOINT_SFTP_SERVER }}
          username: ${{ secrets.HOSTPOINT_SFTP_USERNAME }}
          ssh_private_key: ${{ secrets.HOSTPOINT_SSH_PRIVATE_KEY }}
          port: ${{ secrets.HOSTPOINT_SFTP_PORT }}
          local_path: './deploy/*'
          remote_path: ${{ secrets.HOSTPOINT_REMOTE_PATH }}
          sftp_only: true
